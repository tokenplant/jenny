# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    permissions:
      contents: write
    env:
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.1'
        cache: true

    - name: Download Go Modules
      run: go mod download

    - name: Setup System Requirements (Linux only)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y ripgrep

    - name: Setup Git Config
      run: |
        git config --global user.name "jenny-ci"
        git config --global user.email "jenny-ci@users.noreply.github.com"
        git config --global core.autocrlf false

    - name: Test
      run: go test ./...

    # Compute the version string once per run, then inject it into every platform build via -ldflags.
    - name: Determine Version
      if: runner.os == 'Linux'
      id: version
      run: |
        if [[ "${{ github.ref_type }}" == "tag" ]]; then
          VERSION="${GITHUB_REF_NAME#v}"
        else
          DESC=$(git describe --tags --always 2>/dev/null || true)
          if [[ "$DESC" == v* ]]; then
            VERSION="${DESC#v}"
          elif [[ -n "$DESC" ]]; then
            VERSION="dev-$DESC"
          else
            VERSION="dev-${GITHUB_SHA::7}"
          fi
        fi
        echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Resolved VERSION=$VERSION"

    - name: Build
      if: runner.os == 'Linux'
      env:
        VERSION: ${{ steps.version.outputs.VERSION }}
      run: |
        if [[ "${{ github.ref_type }}" == "tag" || "${{ github.event_name }}" == "pull_request" ]]; then
          ./scripts/build.sh "$VERSION" "all"
        else
          ./scripts/build.sh "$VERSION" "native"
        fi

    - name: Upload Release Assets
      if: ${{ runner.os == 'Linux' && github.ref_type == 'tag' }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Uploading assets for release ${{ github.ref_name }}..."
        for i in {1..10}; do
          if gh release upload ${{ github.ref_name }} jenny-* --clobber; then
            echo "Successfully uploaded assets."
            exit 0
          fi
          echo "Release not found or upload failed, retrying in 10s... ($i/10)"
          sleep 10
        done
        echo "Failed to upload assets after 10 attempts."
        exit 1

    - name: Run Jenny (Create pre-release and attach assets)
      if: ${{ runner.os == 'Linux' && github.event_name == 'push' && github.ref == 'refs/heads/main' && env.ANTHROPIC_AUTH_TOKEN != '' }}
      env:
        ANTHROPIC_AUTH_TOKEN: ${{ env.ANTHROPIC_AUTH_TOKEN }}
        ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        ./jenny-linux-amd64 --verbose --dangerously-skip-permissions "You are a release assistant.
        1. Check the latest GitHub release version using 'gh release list'.
        2. Determine the next alpha version number (e.g., if latest is v0.1.0, next could be v0.1.1-alpha.1).
        3. Generate a descriptive release title and a clear, easy-to-understand summary of the changes and new features based on the commits since the last release.
        4. Create a GitHub pre-release using 'gh release create' with the generated title and notes for the new version. Use the --prerelease flag. This will create the tag.
        5. Identify the created tag name (e.g. v0.1.1-alpha.1).
        6. Extract the version string (e.g. 0.1.1-alpha.1).
        7. Run the build script: './scripts/build.sh <version_string> all'.
        8. Attach all 'jenny-*' assets to the newly created release using 'gh release upload <tag_name> jenny-* --clobber'.
        Do not modify any files in the repository."
