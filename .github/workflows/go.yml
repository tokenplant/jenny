# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.1'

    - name: Test
      run: go test -v ./...

    - name: Build
      run: |
        go build -v ./...
        go build -v -o jenny ./cmd/jenny

    - name: Run Jenny (Pre-release)
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.ANTHROPIC_AUTH_TOKEN != '' }}
      env:
        ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
        ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "jenny-ci"
        git config user.email "jenny-ci@users.noreply.github.com"
        ./jenny --dangerously-skip-permissions "You are a release assistant.
        1. Check the latest GitHub release version using 'gh release list'.
        2. Determine the next alpha version number (e.g., if latest is v0.1.0, next could be v0.1.1-alpha.1).
        3. Create a new git tag for this version and push it.
        4. Create a GitHub pre-release using 'gh release create' with the --generate-notes flag, attaching the 'jenny' binary as a release asset.
        Do not modify any files in the repository."
